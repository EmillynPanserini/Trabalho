<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    habilidade com um jogador de alto nível. Serviço profissional, seguro e rápido." 
    name="description">

    <!-- CSS E HTML LINKADOS-->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/formulario.css">

    <!-- FONTES E ICON-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navMenu" id="navMenu">
        <a class="nav-logo" href="../index.html">
            <img class="logo" src="../imagens/logo.png" alt="logoDarken">
        </a>
        <ul class="nav-list">
            <li><a href="../index.html"> Página Principal</a></li>
            <li><a href="serviços.html">Serviços</a></li>
            <li><a href="feedbacks.html">Feedbacks</a></li>
            <li><a href="contato.html" class="active">Contatos</a></li>
        </ul>
    </nav>

    <main>
        <form id="formulario" action="respFormulario.html" method="post">
            <fieldset>
                <legend>Formulário de Contato</legend>
                <label for="nome">Nome:</label>
                <input id="nome" name="Nome" type="text" required>

                <label for="email">Email:</label>
                <input id="email" name="Email" type="email" required>

                <label for="dtNascimento">Data de Nascimento</label>
                <input id="dtNascimento" name="DtNascimento" type="date" required>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="txtMensagem" rows="5"></textarea>

                <label for="motivo">Motivo do Contato</label>
                <select id="motivo" name="motivo">
                    <option value="suporte">Suporte</option>
                    <option value="vendas">Vendas</option>
                    <option value="servicos">Serviços</option>
                    <option value="fedback">Fedback</option>
                    <option value="outros">Outros</option>
                </select>

                <!-- <input type="submit" value="Enviar"> -->
                <button onclick="mostrarDadosForm(event)">Enviar</button>
                <button onclick="limparDados(event)">Limpar</button>
            </fieldset>

        </form>
        <h2 id="resposta"></h2>
        <br>
        <p id="pNome"></p>
        <p id="pEmail"></p>
        <p id="pData"></p>
        <p id="pMensagem"></p>
        <p id="pMotivo"></p>
    </main>

    </main>

</html>
